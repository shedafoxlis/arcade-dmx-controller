[platformio]
default_envs = esp32-s2-mini

[env:esp32-s2-mini]
platform = espressif32@6.6.0
board = esp32-s2-mini
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags = 
    -DARDUINO_ESP32S2_DEV
    -DCORE_DEBUG_LEVEL=3
    -std=c++17
    -Wall
    -Wextra

lib_deps =
    bodmer/TFT_eSPI@2.5.31
    AsyncTCP@>=1.1.1
    ESPAsyncWebServer@>=1.3.6
    ArduinoJson@>=6.20.0

monitor_filters = 
    esp32_exception_decoder
    colorize
    log2file

upload_port = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0
